name: Roblox FFlag Tracker

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: fflag-tracker
  cancel-in-progress: true

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      OPENAI_API_KEYS: ${{ secrets.OPENAI_API_KEYS }}
      FFLAG_REPO_CACHE: .fflag-repo-cache

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/cache@v4
        with:
          path: .fflag-repo-cache
          key: manifest-${{ github.run_id }}
          restore-keys: manifest-

      - uses: actions/cache@v4
        with:
          path: |
            output/fflag_cache.json
            output/diff_cache.json
            output/history.json
            output/failed_flags.json
            output/.key_index.json
          key: fflag-data-${{ github.run_id }}
          restore-keys: fflag-data-

      - run: pip install -r requirements.txt

      - run: python updateff.py

      - name: Verify output
        run: |
          for f in index.html summary.json FFlag_Report.json history.json sw.js manifest.json assets/app.js; do
            test -f "output/$f" && echo "✅ $f" || { echo "❌ Missing $f"; exit 1; }
          done
          echo "📂 Output:"
          ls -lhR output/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fflag-output
          path: output/
          retention-days: 14

      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: output/
